const slides = [

封面上的吉祥物是蛙、蜥蜴與蝴蝶，代表了生物多樣性與自然觀察的本質。我們相信，這場結合AI的課堂轉變，不僅是技術工具的導入，更是一次幫助學生跨越技術門檻、重拾科學理性樂趣的典範轉移。`

我們希望透過這張藍圖，讓師生在開始行動之前，先對AI協同工作流的整體架構有一個清晰的輪廓。`

這四個方向加在一起，是一套完整的「增能」邏輯，而非簡單的功能替代。`

正是這兩個現實困境，促使我們認真思考如何引進AI，讓它在適當的環節扮演協同助理的角色，而不是邊緣化的點綴。`

// ═══════════════════════════════════════════════════
//  State
// ═══════════════════════════════════════════════════
let currentIndex = 0;
let autoplayTimer = null;
let timerInterval = null;
let timerCountdown = 0;
let autoplayInterval = 10; // seconds
let isFullscreen = false;

// ═══════════════════════════════════════════════════
//  Core functions
// ═══════════════════════════════════════════════════
function goToSlide(index, fromFullscreen = false) {
  if (index < 0) index = slides.length - 1;
  if (index >= slides.length) index = 0;
  currentIndex = index;

  const slide = slides[currentIndex];
  const total = slides.length;
  const num = currentIndex + 1;

  // Main view
  const img = document.getElementById('slide-img');
  img.classList.add('fade');
  setTimeout(() => {
    img.src = slide.image;
    img.classList.remove('fade');
  }, 180);

  document.getElementById('text-content').innerHTML = slide.text.replace(/\n\n/g, '</p><p>').replace(/^/, '<p>').replace(/$/, '</p>');
  document.getElementById('text-slide-num').textContent = `Slide ${num} 解說`;
  document.getElementById('slide-counter').textContent = `${num} / ${total}`;

  // Fullscreen view
  const fsImg = document.getElementById('fs-img');
  fsImg.classList.add('fade');
  setTimeout(() => {
    fsImg.src = slide.image;
    fsImg.classList.remove('fade');
  }, 180);
  document.getElementById('fs-counter').textContent = `${num} / ${total}`;

  // Progress bar
  document.getElementById('progress-bar').style.width = `${(num / total) * 100}%`;

  // Restart timer ring if autoplay is on
  if (autoplayTimer) {
    restartTimerRing();
  }
}

function navigate(direction, fromFullscreen = false) {
  goToSlide(currentIndex + direction, fromFullscreen);
}

function toggleAutoplay() {
  if (autoplayTimer) {
    stopAutoplay();
  } else {
    startAutoplay();
  }
}

function startAutoplay() {
  const btn = document.getElementById('btn-autoplay');
  const fsBtn = document.getElementById('fs-btn-autoplay');
  btn.textContent = '⏸ 暫停播放';
  btn.classList.add('active');
  fsBtn.textContent = '⏸ 暫停播放';
  fsBtn.classList.add('active');

  document.getElementById('timer-ring').classList.remove('hidden');
  restartTimerRing();

  autoplayTimer = setInterval(() => {
    navigate(1);
  }, autoplayInterval * 1000);
}

function stopAutoplay() {
  if (autoplayTimer) {
    clearInterval(autoplayTimer);
    autoplayTimer = null;
  }
  if (timerInterval) {
    clearInterval(timerInterval);
    timerInterval = null;
  }

  const btn = document.getElementById('btn-autoplay');
  const fsBtn = document.getElementById('fs-btn-autoplay');
  btn.textContent = '▷ 自動播放';
  btn.classList.remove('active');
  fsBtn.textContent = '▷ 自動播放';
  fsBtn.classList.remove('active');

  document.getElementById('timer-ring').classList.add('hidden');
  resetTimerRing();
}

function restartTimerRing() {
  if (timerInterval) clearInterval(timerInterval);
  resetTimerRing();
  timerCountdown = autoplayInterval;
  const circle = document.getElementById('timer-circle');
  const circumference = 75.4;

  timerInterval = setInterval(() => {
    timerCountdown--;
    const offset = circumference * (timerCountdown / autoplayInterval);
    circle.style.strokeDashoffset = offset;
    if (timerCountdown <= 0) clearInterval(timerInterval);
  }, 1000);
}

function resetTimerRing() {
  const circle = document.getElementById('timer-circle');
  circle.style.strokeDashoffset = 75.4;
}

function setSpeed(val) {
  autoplayInterval = parseInt(val);
  // Sync both selects
  document.getElementById('speed-select').value = val;
  document.getElementById('speed-select2').value = val;

  if (autoplayTimer) {
    stopAutoplay();
    startAutoplay();
  }
}

function enterFullscreen() {
  const overlay = document.getElementById('fullscreen-overlay');
  overlay.classList.add('active');
  isFullscreen = true;
  document.getElementById('fs-img').src = slides[currentIndex].image;
  document.getElementById('fs-counter').textContent = `${currentIndex + 1} / ${slides.length}`;

  // Try browser native fullscreen
  if (overlay.requestFullscreen) overlay.requestFullscreen().catch(() => {});
}

function exitFullscreen() {
  const overlay = document.getElementById('fullscreen-overlay');
  overlay.classList.remove('active');
  isFullscreen = false;
  if (document.fullscreenElement) {
    document.exitFullscreen().catch(() => {});
  }
}

// Keyboard navigation
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') navigate(1);
  if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') navigate(-1);
  if (e.key === 'Escape' && isFullscreen) exitFullscreen();
  if (e.key === ' ') { e.preventDefault(); toggleAutoplay(); }
  if (e.key === 'f' || e.key === 'F') { isFullscreen ? exitFullscreen() : enterFullscreen(); }
});

// Exit fullscreen when browser native fullscreen exits
document.addEventListener('fullscreenchange', () => {
  if (!document.fullscreenElement && isFullscreen) {
    document.getElementById('fullscreen-overlay').classList.remove('active');
    isFullscreen = false;
  }
});

// ── Theme toggle ──
let isLight = false;
function toggleTheme() {
  isLight = !isLight;
  document.body.classList.toggle('light', isLight);
  const btn = document.getElementById('btn-theme');
  btn.textContent = isLight ? '🌑' : '🌙';
  btn.title = isLight ? '切換為深色背景' : '切換為白色背景';
}

// Init
goToSlide(0);
</script>
